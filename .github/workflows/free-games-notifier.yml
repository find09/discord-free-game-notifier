name: Free Games Notifier (Steam + Epic PC only)

on:
  schedule:
    - cron: '0 9,21 * * *'    # 12時間ごと
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --frozen

      # 重複防止データを復元
      - name: Restore seen games data
        uses: actions/cache@v4
        with:
          path: ~/.local/share/discord_free_game_notifier/
          key: free-games-seen-v4
          restore-keys: |
            free-games-seen-v4

      # === 実行前のフォルダ確認 ===
      - name: Debug - Check data folder BEFORE run
        run: |
          echo "=== BEFORE run ==="
          ls -la ~/.local/share/discord_free_game_notifier/ || echo "フォルダなし（初回は正常）"

      # メイン実行
      - name: Run free games notifier
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STORES: steam,epic
          PLATFORMS: pc
        run: uv run python -m discord_free_game_notifier.main

      # === 実行後のフォルダ確認（ここが一番重要！） ===
      - name: Debug - Check data folder AFTER run
        run: |
          echo "=== AFTER run ==="
          ls -la ~/.local/share/discord_free_game_notifier/ || echo "フォルダなし"
          echo "=== ファイル一覧 ==="
          find ~/.local/share/discord_free_game_notifier/ -type f || echo "ファイルなし"
