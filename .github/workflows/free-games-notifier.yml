name: Free Games Notifier

on:
  schedule:
    - cron: '0 */12 * * *'    # 12時間ごと（調整したい場合は変更）
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      # ==================== ここを改善 =====================
      - name: Cache seen games data (重複防止データを保持)
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/discord_free_game_notifier/
            ~/.cache/discord_free_game_notifier/
          key: free-games-seen-v3          # 固定キー（毎回同じ）
          restore-keys: |
            free-games-seen-v3
      # ====================================================

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run free games notifier
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STORES: steam,epic
          PLATFORMS: pc
        run: uv run python -m discord_free_game_notifier.main
