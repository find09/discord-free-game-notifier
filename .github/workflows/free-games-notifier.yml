name: Free Games Notifier (Steam + Epic PC only)

on:
  schedule:
    - cron: '0 9,21 * * *'    # 12時間ごと（日本時間 朝9時・夜21時）
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --frozen

      # ==================== 重複防止データを永続化（これが重要！） ====================
      - name: Restore seen games data (重複防止用)
        uses: actions/cache@v4
        with:
          path: ~/.local/share/discord_free_game_notifier/
          key: free-games-seen-v4
          restore-keys: |
            free-games-seen-v4

      - name: Debug - Check saved data folder
        run: ls -la ~/.local/share/discord_free_game_notifier/ || echo "Folder not found yet (初回は正常)"

      # =============================================================================

      - name: Run free games notifier
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          STORES: steam,epic        # SteamとEpicのみ
          PLATFORMS: pc             # PCゲームのみ
        run: uv run python -m discord_free_game_notifier.main
